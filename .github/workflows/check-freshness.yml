name: Pipeline freshness check

on:
  schedule:
    # Weekly on Mondays at 14:00 UTC — late enough that Sunday's
    # update-members and Monday's update-bills have both completed.
    - cron: "0 14 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: check-freshness
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: data-pipeline/requirements.txt

      - name: Install Python dependencies
        run: uv pip install --system -r data-pipeline/requirements.txt

      - name: Run freshness check
        run: python data-pipeline/scripts/check_freshness.py
