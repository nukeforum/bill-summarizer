name: Update bills

on:
  schedule:
    - cron: "0 6 * * *"  # Every day at 06:00 UTC.
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-bills
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: data-pipeline/requirements.txt

      - name: Install Python dependencies
        run: pip install -r data-pipeline/requirements.txt

      - name: Fetch bills
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: python data-pipeline/scripts/fetch_bills.py

      - name: Commit updated bills.json
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/bills.json
          if git diff --staged --quiet; then
            echo "No changes to bills.json — skipping commit."
            exit 0
          fi
          git commit -m "Update bills.json [bot]"
          git push
