name: Data pipeline tests

on:
  pull_request:
    paths:
      - 'data-pipeline/**'
      - '.github/workflows/data-pipeline-tests.yml'
  workflow_dispatch: {}

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: data-pipeline/requirements.txt
      - name: Install dependencies
        run: pip install -r data-pipeline/requirements.txt
      - name: Run pytest
        working-directory: data-pipeline
        run: pytest -v
