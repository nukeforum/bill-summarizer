name: Data pipeline tests

on:
  pull_request:
    paths:
      - 'data-pipeline/**'
      - '.github/workflows/data-pipeline-tests.yml'
  workflow_dispatch: {}

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: data-pipeline/requirements.txt
      - name: Install dependencies
        run: uv pip install --system -r data-pipeline/requirements.txt ruff==0.8.4
      - name: Lint with ruff
        working-directory: data-pipeline
        run: ruff check scripts tests
      - name: Run pytest
        working-directory: data-pipeline
        run: pytest -v
