name: Update ZIP-to-CD crosswalk

on:
  schedule:
    # 1st of every quarter at 04:00 UTC. HUD updates quarterly.
    - cron: "0 4 1 1,4,7,10 *"
  workflow_dispatch:
    inputs:
      year:
        description: "HUD data year"
        required: false
        default: ""
      quarter:
        description: "HUD data quarter (1-4)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: update-zip-crosswalk
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: data-pipeline/requirements.txt

      - name: Install Python dependencies
        run: pip install -r data-pipeline/requirements.txt

      - name: Build ZIP→CD asset
        env:
          HUDUSER_API_KEY: ${{ secrets.HUDUSER_API_KEY }}
        run: |
          set -euo pipefail
          ARGS=( api android/app/src/main/assets/zip_to_cd.json --sleep 0.1 )
          if [ -n "${{ inputs.year }}" ]; then
            ARGS+=( --year "${{ inputs.year }}" )
          fi
          if [ -n "${{ inputs.quarter }}" ]; then
            ARGS+=( --quarter "${{ inputs.quarter }}" )
          fi
          python data-pipeline/scripts/build_zip_crosswalk.py "${ARGS[@]}"

      - name: Commit updated asset
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android/app/src/main/assets/zip_to_cd.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit."
            exit 0
          fi
          git commit -m "Update ZIP-to-CD crosswalk [bot]"
          git push
