name: Update members

on:
  schedule:
    - cron: "0 3 * * 0"  # Every Sunday at 03:00 UTC.
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-members
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: data-pipeline/requirements.txt

      - name: Install Python dependencies
        run: pip install -r data-pipeline/requirements.txt

      - name: Configure git for bot commits
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Phase 1 — fetch member index
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: python data-pipeline/scripts/fetch_members.py --phase1-only

      - name: Commit Phase 1 (members index)
        if: always()
        run: |
          set -euo pipefail
          git add docs/data/members_*.json
          if git diff --staged --quiet; then
            echo "No index changes — skipping commit."
            exit 0
          fi
          git commit -m "Update members index [bot]"
          git push

      - name: Phase 2 — backfill sponsored / cosponsored legislation
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: python data-pipeline/scripts/fetch_members.py --phase2-only --time-budget-minutes 280

      - name: Commit Phase 2 (members legislation)
        if: always()
        run: |
          set -euo pipefail
          # Pull anything the index commit may have raced with (rare but cheap).
          git pull --rebase origin main || true
          git add docs/data/members/*.json docs/data/members_*.json
          if git diff --staged --quiet; then
            echo "No legislation changes — skipping commit."
            exit 0
          fi
          git commit -m "Update members legislation [bot]"
          git push
