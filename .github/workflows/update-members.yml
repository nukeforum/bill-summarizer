name: Update members

on:
  schedule:
    - cron: "0 3 * * 0"  # Every Sunday at 03:00 UTC.
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-members
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        # See update-bills.yml — PAT needed so the push-back step can
        # bypass the "main branch" ruleset (GITHUB_TOKEN can't).
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PIPELINE_PUSH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: data-pipeline/requirements.txt

      - name: Install Python dependencies
        run: uv pip install --system -r data-pipeline/requirements.txt

      - name: Phase 1 — fetch member index
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: python data-pipeline/scripts/fetch_members.py --phase1-only

      - name: Rebuild pipeline dashboard (post-Phase 1)
        if: always()
        run: python data-pipeline/scripts/build_dashboard.py

      - name: Commit Phase 1 (members index)
        if: always()
        uses: ./.github/actions/safe-push
        with:
          paths: |
            docs/data/members_*.json
            docs/pipeline.html
          message: "Update members index [bot]"

      - name: Phase 2 — backfill sponsored / cosponsored legislation
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: python data-pipeline/scripts/fetch_members.py --phase2-only --time-budget-minutes 280

      - name: Rebuild pipeline dashboard (post-Phase 2)
        if: always()
        run: python data-pipeline/scripts/build_dashboard.py

      - name: Commit Phase 2 (members legislation)
        if: always()
        uses: ./.github/actions/safe-push
        with:
          paths: |
            docs/data/members/*.json
            docs/data/members_*.json
            docs/pipeline.html
          message: "Update members legislation [bot]"
