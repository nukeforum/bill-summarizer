name: Backfill bills

on:
  schedule:
    - cron: "0 12 * * *"  # 12:00 UTC, 6h after the daily fresh-pull job.
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-bills
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: data-pipeline/requirements.txt

      - name: Install Python dependencies
        run: pip install -r data-pipeline/requirements.txt

      - name: Backfill bills
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: python data-pipeline/scripts/backfill_bills.py

      - name: Commit updated data and state
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/bills.json \
                  docs/data/congress*_bills.json \
                  docs/data/congresses.json \
                  data-pipeline/state/backfill_state.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit."
            exit 0
          fi
          git commit -m "Backfill bills [bot]"
          git push
