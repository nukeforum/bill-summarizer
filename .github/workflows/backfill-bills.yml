name: Backfill bills

on:
  schedule:
    - cron: "0 12 * * *"  # 12:00 UTC, 6h after the daily fresh-pull job.
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-bills
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: data-pipeline/requirements.txt

      - name: Install Python dependencies
        run: uv pip install --system -r data-pipeline/requirements.txt

      - name: Backfill bills
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: python data-pipeline/scripts/backfill_bills.py

      - name: Rebuild pipeline dashboard
        if: always()
        run: python data-pipeline/scripts/build_dashboard.py

      - name: Commit updated data and state
        uses: ./.github/actions/safe-push
        with:
          paths: |
            docs/data/congress*_bills.json
            docs/data/congresses.json
            data-pipeline/state/backfill_state.json
            docs/pipeline.html
          message: "Backfill bills [bot]"
