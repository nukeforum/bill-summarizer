name: Pipeline KMP tests

on:
  pull_request:
    paths:
      - 'pipeline/**'
      - '.github/workflows/pipeline-tests.yml'
  push:
    branches: [main]
    paths:
      - 'pipeline/**'
      - '.github/workflows/pipeline-tests.yml'
  workflow_dispatch: {}

concurrency:
  group: pipeline-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shared:
    name: shared/check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Run :shared:check (JVM tests + iOS klib compile)
        working-directory: pipeline
        run: ./gradlew :shared:check --no-daemon --stacktrace
      - name: Upload JVM test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: shared-test-reports
          path: |
            pipeline/shared/build/reports/tests/
            pipeline/shared/build/test-results/

  cli:
    name: cli/run
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Build and run the placeholder CLI
        working-directory: pipeline
        run: ./gradlew :cli:run --no-daemon --stacktrace
